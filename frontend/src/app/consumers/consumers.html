<h2>Consumidores</h2>


<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let consumer of consumers()">
      <td>{{ consumer.id }}</td>
      <td>{{ consumer.name }}</td>
      <td>{{ consumer.email }}</td>
    </tr>
  </tbody>
</table>
