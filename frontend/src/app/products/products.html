<div class="p-10 max-w-4xl mx-auto">
  <h2 class="text-2xl font-bold mb-6 text-center">Productos</h2>

  <!-- Formulario -->
  <div class="mb-6 p-4 border rounded bg-white max-w-md">
    <h3 class="font-semibold mb-3">Nuevo producto</h3>

    <label class="block text-sm font-semibold mb-1">Nombre</label>
    <input [(ngModel)]="newName" placeholder="Nombre del producto" class="border p-2 rounded w-full mb-3">

    <label class="block text-sm font-semibold mb-1">Descripción</label>
    <input [(ngModel)]="newDescription" placeholder="Descripción" class="border p-2 rounded w-full mb-3">

    <label class="block text-sm font-semibold mb-1">Precio</label>
    <input [(ngModel)]="newPrice" type="number" placeholder="0" class="border p-2 rounded w-full mb-3">

    <label class="block text-sm font-semibold mb-1">Stock</label>
    <input [(ngModel)]="newStock" type="number" placeholder="0" class="border p-2 rounded w-full mb-3">

    <button (click)="createProduct()" class="bg-green-600 text-white px-4 py-2 rounded w-full">
      Crear producto
    </button>
  </div>

  <!-- Tabla -->
  <table class="w-full text-left bg-white border rounded">
    <thead class="bg-gray-100">
      <tr>
        <th class="p-2">Id</th>
        <th class="p-2">Nombre</th>
        <th class="p-2">Descripción</th>
        <th class="p-2">Precio</th>
        <th class="p-2">Stock</th>
        <th class="p-2">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products()" class="border-t">
        <td class="p-2">{{ product.id }}</td>
        <td class="p-2">
          <span *ngIf="editingId !== product.id">{{ product.name }}</span>
          <input *ngIf="editingId === product.id" [(ngModel)]="editName" class="border p-1 rounded w-full">
        </td>
        <td class="p-2">
          <span *ngIf="editingId !== product.id">{{ product.description }}</span>
          <input *ngIf="editingId === product.id" [(ngModel)]="editDescription" class="border p-1 rounded w-full">
        </td>
        <td class="p-2">
          <span *ngIf="editingId !== product.id">{{ product.price }}</span>
          <input *ngIf="editingId === product.id" [(ngModel)]="editPrice" type="number" class="border p-1 rounded w-full">
        </td>
        <td class="p-2">
          <span *ngIf="editingId !== product.id">{{ product.stock }}</span>
          <input *ngIf="editingId === product.id" [(ngModel)]="editStock" type="number" class="border p-1 rounded w-full">
        </td>
        <td class="p-2 flex gap-2">
          <ng-container *ngIf="editingId !== product.id">
            <button (click)="startEdit(product)" class="bg-yellow-500 text-white px-3 py-1 rounded">Editar</button>
            <button (click)="deleteProduct(product.id)" class="bg-red-600 text-white px-3 py-1 rounded">Eliminar</button>
          </ng-container>
          <ng-container *ngIf="editingId === product.id">
            <button (click)="saveEdit()" class="bg-green-600 text-white px-3 py-1 rounded">Guardar</button>
            <button (click)="cancelEdit()" class="bg-gray-400 text-white px-3 py-1 rounded">Cancelar</button>
          </ng-container>
        </td>
      </tr>
    </tbody>
  </table>
</div>
