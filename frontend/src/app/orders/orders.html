<h2>ordernes</h2>


<table>
  <thead>
    <tr>
      <th>Id</th>
      <th>Consumidor</th>
      <th>Total</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let order of orders()">
      <td>{{ order.id }}</td>
      <td>{{ order.consumer_name }}</td>
      <td>{{ order.total }}</td>
      <td>{{ order.created_at }}</td>
    </tr>
  </tbody>
</table>
